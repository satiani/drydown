---
# drydown app configuration.
#
# This file is read by AppDaemon and passed to the app as self.args.
# AppDaemon requires the app to be nested under a named section (the app
# name, used in logs) — `drydown:` here — with `module`/`class` and all
# arguments inside it. A flat top-level `module:`/`class:` will be rejected
# as a BadAppConfig.
#
# This is the single source of truth for what sensors to track and how to
# reach InfluxDB. Pot sizes are NOT configured here — they are attached as
# attributes to the source moisture entities via HA's `customize` block in
# /config/configuration.yaml, and read at runtime.
#
# dry_run: true computes everything and logs results as JSON without writing
# any entities — use it to validate calibration against live data before
# enabling for real (see README "Development").

drydown:
  module: drydown
  class: Drydown
  dry_run: false

  # InfluxDB connection (the a0d7b954_influxdb add-on, reachable by hostname
  # from inside the HA Docker network). Adjust creds only if you've changed
  # them from the add-on defaults.
  #
  # moisture_measurement / conductivity_measurement: the InfluxDB measurements
  # to query, as raw FROM-clause tokens. The HA InfluxDB integration names
  # measurements by unit_of_measurement, so defaults are "%" for moisture and
  # a /.*S.cm/ regex for conductivity (robust to µ-encoding variants). Use a
  # quoted literal '"name"' for an exact match or /regex/ for a pattern.
  influxdb:
    host: a0d7b954-influxdb
    port: 8086
    database: homeassistant
    username: homeassistant
    password: homeassistant
    moisture_measurement: '"%"'
    conductivity_measurement: /.*S.cm/

  # InfluxDB transient-failure retry. Backoff doubles per attempt (seconds).
  influx_retries: 3
  influx_backoff: 1.0

  # How much history to pull per run for calibration.
  lookback_days: 60

  # Plant sensors to track. Key = the plant label used in the output entity id
  # (sensor.drydown_<key>). Value = the source moisture entity id. The app
  # derives conductivity / temperature entity ids by replacing the `_moisture`
  # suffix.
  sensors:
    plant_1:
      moisture_entity: sensor.plant_sensor_1_moisture
    plant_2:
      moisture_entity: sensor.plant_sensor_2_moisture
    plant_3:
      moisture_entity: sensor.plant_sensor_3_moisture
    plant_4:
      moisture_entity: sensor.plant_sensor_4_moisture
    plant_5:
      moisture_entity: sensor.plant_sensor_5_moisture
    plant_6:
      moisture_entity: sensor.plant_sensor_6_moisture
    plant_7:
      moisture_entity: sensor.living_room_plant_sensor_7_moisture
    plant_8:
      moisture_entity: sensor.kitchen_plant_sensor_8_moisture
    plant_9:
      moisture_entity: sensor.kitchen_plant_sensor_9_moisture

  # Adaptive moisture-jump threshold (in % points) for watering detection, by
  # pot size. A shallow probe in a large pot barely moves when watered, so the
  # threshold scales down with pot size.
  jump_threshold:
    small: 15
    medium: 8
    large: 5

  # A watering only counts as a "valid dry-trigger watering" (informative for
  # the dry floor) if the pre-watering moisture was below this fraction of the
  # wet ceiling. Filters out mass-waterings of still-moist plants.
  valid_watering_floor_fraction: 0.65

  # Margin (in %-points/day) a watering-day moisture slope must exceed the
  # prior day's slope by to count as a rate reversal. Tunes how aggressively
  # slope flattening alone (without a jump) triggers a watering detection.
  slope_reversal_margin: 1.0

  # Confidence tier thresholds (count of valid dry-trigger waterings).
  confidence_valid_for_medium: 1   # >= this -> medium
  confidence_valid_for_high: 3     # >= this -> high

  # Scheduling. The app runs hourly, recomputing everything from the latest
  # InfluxDB pull each time. (A separate daily recalibration path is deferred
  # to Pass B, where hourly runs will reuse cached calibration.)
  schedule:
    hourly_update:
      type: hourly
      minute: 5
