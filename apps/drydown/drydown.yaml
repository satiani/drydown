---
# drydown app configuration.
#
# AppDaemon requires the app nested under a named section (the app name, used
# in logs) — `drydown:` here — with `module`/`class` and all arguments inside.
#
# The app is a pure InfluxDB → MQTT transformer: it reads moisture/conductivity
# history + latest values from InfluxDB and publishes one Home Assistant device
# per plant (via MQTT discovery) with one sensor entity per metric. It reads
# nothing from HA's state machine. Pot size is configured per-sensor here (not
# via HA customize), since the app no longer reads HA state.
#
# dry_run: true computes everything and logs results as JSON without publishing
# — useful for validating calibration against live data with no side effects.

drydown:
  module: drydown
  class: Drydown
  dry_run: false

  # InfluxDB connection. The HA InfluxDB integration names measurements by
  # unit_of_measurement, so defaults are "%" for moisture and a /.*S.cm/ regex
  # for conductivity (robust to µ-encoding variants). Override either as a
  # quoted literal '"name"' or /regex/ if your schema differs.
  influxdb:
    host: a0d7b954-influxdb
    port: 8086
    database: homeassistant
    username: homeassistant
    password: homeassistant
    moisture_measurement: '"%"'
    conductivity_measurement: /.*S.cm/

  # InfluxDB transient-failure retry. Backoff doubles per attempt (seconds).
  influx_retries: 3
  influx_backoff: 1.0

  lookback_days: 60

  # Plant sensors to track. Key = plant label (becomes the device name and the
  # entity-id prefix). Conductivity entity is derived by replacing `_moisture`
  # with `_conductivity`.
  sensors:
    plant_1:
      moisture_entity: sensor.plant_sensor_1_moisture
    plant_2:
      moisture_entity: sensor.plant_sensor_2_moisture
    plant_3:
      moisture_entity: sensor.plant_sensor_3_moisture
    plant_4:
      moisture_entity: sensor.plant_sensor_4_moisture
    plant_5:
      moisture_entity: sensor.plant_sensor_5_moisture
    plant_6:
      moisture_entity: sensor.plant_sensor_6_moisture
    plant_7:
      moisture_entity: sensor.living_room_plant_sensor_7_moisture
    plant_8:
      moisture_entity: sensor.kitchen_plant_sensor_8_moisture
    plant_9:
      moisture_entity: sensor.kitchen_plant_sensor_9_moisture

  # A watering is detected when a day's peak moisture jumps this many points
  # above the previous day's peak. Real waterings spike by tens of %; sensor
  # noise is a few %, so one threshold separates them across all pots.
  jump_threshold: 10

  valid_watering_floor_fraction: 0.65
  confidence_valid_for_high: 3

  schedule:
    hourly_update:
      type: hourly
      minute: 5
